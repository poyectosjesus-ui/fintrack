version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: fintrack-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: finance_tracker
    ports:
      - "5432:5432"
    volumes:
      - fintrack_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d finance_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  fintrack:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fintrack-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # La URL fuerza conexión al servicio "db" del orquestador, ignorando lo que dicte el .env si hace falta
      - DATABASE_URL=postgresql://devuser:devpass@db:5432/finance_tracker

volumes:
  fintrack_postgres_data:
